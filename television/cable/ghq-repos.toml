[metadata]
name = "ghq-repos"
description = "A channel to select local github repos"
requirements = [ "ghq",]

[source]
command = "ghq list --full-path"
output = "{}"

[preview]
command = "eza --color=always --icons=always '{}'"

[keybindings]
enter = "confirm_selection"

[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv ghq-repos .."
mode = "execute"
